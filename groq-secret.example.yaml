# Copy this file to `groq-secret.yaml` and replace the placeholder with your
# real Groq API key (https://console.groq.com/keys). The real file is
# gitignored by the `*secret*` rule and will not be tracked.
apiVersion: v1
kind: Secret
metadata:
  name: kagent-groq
  namespace: kagent
type: Opaque
stringData:
  GROQ_API_KEY: <your-groq-api-key>
